<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCCM PMO — Universal Cornea Care Mission</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F8FA;
  --surface: #FFFFFF;
  --surface-2: #F2F4F8;
  --border: #E4E8F0;
  --border-2: #D0D8E8;
  --text-primary: #0F1B2D;
  --text-secondary: #526079;
  --text-muted: #8A9BB5;
  --accent: #1847A8;
  --accent-light: #EBF0FF;
  --accent-hover: #1439A0;
  --green: #0D7A5F;
  --green-bg: #E8F7F2;
  --amber: #B45309;
  --amber-bg: #FEF3C7;
  --red: #B91C1C;
  --red-bg: #FEE2E2;
  --purple: #6D28D9;
  --purple-bg: #EDE9FE;
  --teal: #0891B2;
  --teal-bg: #E0F2FE;
  --shadow-sm: 0 1px 3px rgba(15,27,45,0.06), 0 1px 2px rgba(15,27,45,0.04);
  --shadow-md: 0 4px 12px rgba(15,27,45,0.08), 0 2px 6px rgba(15,27,45,0.04);
  --shadow-lg: 0 8px 24px rgba(15,27,45,0.10), 0 4px 8px rgba(15,27,45,0.04);
  --r: 10px;
  --r-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 13.5px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar {
  width: 228px; background: var(--text-primary); flex-shrink: 0;
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.logo-mark { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.logo-eye {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
}
.logo-eye svg { width: 16px; height: 16px; fill: white; }
.logo-name { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
.logo-sub { font-size: 10.5px; color: rgba(255,255,255,0.38); padding-left: 40px; }

.nav-group { padding: 20px 10px 6px; font-size: 9.5px; font-weight: 600; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 1.2px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: var(--r-sm); cursor: pointer; color: rgba(255,255,255,0.52);
  font-size: 12.5px; font-weight: 500; transition: all .15s; margin: 1px 6px;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-item i { font-size: 15px; width: 17px; flex-shrink: 0; }
.nav-item .nav-label { flex: 1; }
.nav-item .nav-count { font-size: 10px; background: rgba(255,255,255,0.12); padding: 1px 6px; border-radius: 10px; }
.nav-item.active .nav-count { background: rgba(255,255,255,0.22); }

.sidebar-user {
  margin: auto 10px 14px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--r-sm);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px; cursor: pointer;
}
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 10.5px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.85); }
.user-role { font-size: 10px; color: rgba(255,255,255,0.4); }

/* ── MAIN ────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 54px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; box-shadow: var(--shadow-sm);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-breadcrumb { font-size: 11px; color: var(--text-muted); }
.topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
  padding: 6px 14px; border-radius: var(--r-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary); cursor: pointer;
  font-size: 12px; font-weight: 500; display: inline-flex; align-items: center;
  gap: 5px; transition: all .15s; font-family: inherit; white-space: nowrap;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-2); color: var(--text-primary); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--border); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-danger { background: var(--red-bg); border-color: #FCA5A5; color: var(--red); }
.btn-danger:hover { background: #FEE2E2; }
.btn-success { background: var(--green-bg); border-color: #6EE7B7; color: var(--green); }

/* ── CONTENT ─────────────────────────────────────────── */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

/* ── LAYOUT ─────────────────────────────────────────── */
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── CARD ────────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px; box-shadow: var(--shadow-sm);
}
.card-sm { padding: 14px; }
.card-title {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.card-title i { font-size: 14px; color: var(--accent); }

/* ── KPI TILES ───────────────────────────────────────── */
.kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--kpi-accent, var(--accent)); border-radius: var(--r) var(--r) 0 0;
}
.kpi-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 5px; font-family: 'DM Serif Display', serif; }
.kpi-sub { font-size: 11px; color: var(--text-muted); }
.kpi-sub.ok { color: var(--green); }
.kpi-sub.warn { color: var(--amber); }
.kpi-sub.danger { color: var(--red); }
.kpi-icon { position: absolute; right: 14px; top: 18px; font-size: 20px; opacity: 0.12; color: var(--text-primary); }

/* ── BADGES ──────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.7; }
.badge-success { background: var(--green-bg); color: var(--green); }
.badge-warning { background: var(--amber-bg); color: var(--amber); }
.badge-danger  { background: var(--red-bg); color: var(--red); }
.badge-info    { background: var(--teal-bg); color: var(--teal); }
.badge-purple  { background: var(--purple-bg); color: var(--purple); }
.badge-gray    { background: var(--surface-2); color: var(--text-secondary); }
.badge-accent  { background: var(--accent-light); color: var(--accent); }

/* ── PROGRESS ────────────────────────────────────────── */
.progress-bar { height: 5px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* ── TABLE ───────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead tr { border-bottom: 2px solid var(--border); }
th { padding: 9px 12px; text-align: left; color: var(--text-muted); font-weight: 600; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface-2); }

/* ── TAGS ────────────────────────────────────────────── */
.tag {
  display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 10.5px;
  font-weight: 600; background: var(--accent-light); color: var(--accent);
}

/* ── TABS ────────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
.tab {
  padding: 8px 14px; cursor: pointer; color: var(--text-muted); font-size: 12.5px;
  font-weight: 500; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
.tab:hover:not(.active) { color: var(--text-primary); }

/* ── SECTION HEADING ─────────────────────────────────── */
.section-heading {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title { font-size: 14px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.section-title i { font-size: 16px; color: var(--accent); }
.section-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }

/* ── ALERTS ──────────────────────────────────────────── */
.alert-row {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px;
  border-radius: var(--r-sm); margin-bottom: 6px; font-size: 12.5px;
}
.alert-danger  { background: #FFF5F5; border: 1px solid #FED7D7; color: #822727; }
.alert-warning { background: #FFFBEB; border: 1px solid #FDE68A; color: #7C4A00; }
.alert-info    { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E40AF; }
.alert-row i { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* ── TIMELINE ────────────────────────────────────────── */
.timeline-row { display: flex; align-items: center; margin-bottom: 10px; gap: 12px; }
.timeline-label { width: 160px; font-size: 11.5px; color: var(--text-secondary); flex-shrink: 0; font-weight: 500; line-height: 1.2; }
.timeline-bar-wrap { flex: 1; background: var(--surface-2); border-radius: 4px; height: 20px; position: relative; overflow: hidden; }
.timeline-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 10.5px; font-weight: 600; color: #fff; white-space: nowrap; position: absolute; }

/* ── RISK ────────────────────────────────────────────── */
.risk-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--r-sm); background: var(--surface-2); border: 1px solid var(--border); margin-bottom: 8px; }
.risk-score { width: 34px; height: 34px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }

/* ── CHART WRAP ──────────────────────────────────────── */
.chart-wrap { position: relative; height: 220px; width: 100%; }

/* ── MODAL ───────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15,27,45,0.35); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 500px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 18px; }
.form-group { margin-bottom: 13px; }
.form-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 8px 10px; color: var(--text-primary); font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s; }
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
.form-select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 8px 10px; color: var(--text-primary); font-size: 13px; outline: none; font-family: inherit; }

/* ── NOTIFICATION ────────────────────────────────────── */
.notification { position: fixed; top: 16px; right: 16px; background: var(--text-primary); border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 13px; z-index: 2000; animation: slideIn .25s ease; max-width: 320px; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); }
@keyframes slideIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── HIER NODE ───────────────────────────────────────── */
.hier-node { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 12px; font-size: 11.5px; color: var(--text-secondary); margin: 4px; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: all .15s; box-shadow: var(--shadow-sm); }
.hier-node:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* ── VENDOR CARD ──────────────────────────────────────── */
.vendor-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }

/* ── AVATAR ──────────────────────────────────────────── */
.avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; flex-shrink: 0; }

/* ─────────────────────────────────────────────────────── */
/*  STRATEGY HOUSE  — Premium Redesign                    */
/* ─────────────────────────────────────────────────────── */

.sh-wrapper { margin-bottom: 24px; }

/* Vision Banner */
.sh-vision {
  background: linear-gradient(105deg, #0F1B2D 0%, #1847A8 60%, #1C5AE8 100%);
  border-radius: 12px 12px 0 0;
  padding: 22px 32px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.sh-vision::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.sh-vision-text { text-align: center; position: relative; z-index: 1; }
.sh-vision-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
.sh-vision-title { font-size: 17px; font-weight: 400; color: #fff; font-family: 'DM Serif Display', serif; }
.sh-vision-title strong { color: #FFD700; font-weight: 400; font-style: italic; }
.sh-vision-tagline { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* Track headers */
.sh-grid {
  display: grid;
  grid-template-columns: 160px repeat(4, 1fr);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 12px 12px;
  overflow: hidden;
  background: var(--surface);
  box-shadow: var(--shadow-md);
}

.sh-track-header {
  padding: 14px 10px;
  text-align: center;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: #fff;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.sh-track-header:last-child { border-right: none; }
.sh-track-header .sh-track-icon { font-size: 18px; margin-bottom: 6px; opacity: 0.9; }

.sh-row-label {
  padding: 10px 12px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}
.sh-row-label-text {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.7px; color: #fff; writing-mode: initial; line-height: 1.3;
  text-align: left;
}

.sh-cell {
  padding: 9px 10px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 11.5px; color: var(--text-secondary);
  text-align: center; vertical-align: middle;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
  line-height: 1.35;
}
.sh-cell:last-child { border-right: none; }
.sh-cell:hover { background: var(--accent-light); color: var(--accent); }

.sh-cell-ai {
  background: #F0F4FF;
  font-style: italic; color: var(--accent);
  font-weight: 500;
}
.sh-cell-ai:hover { background: #D8E4FF; }

/* Empty corner */
.sh-corner {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}

/* KPI outcome row */
.sh-outcome-label {
  padding: 14px 12px;
  border-right: 1px solid var(--border);
  background: #FFFBEB;
  display: flex; align-items: center; justify-content: center;
}
.sh-outcome-label-text { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--amber); text-align: center; }
.sh-outcome-cell {
  padding: 12px 10px;
  border-right: 1px solid var(--border);
  background: #FFFBEB;
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 3px;
}
.sh-outcome-cell:last-child { border-right: none; }
.sh-outcome-metric { font-size: 11px; font-weight: 600; color: var(--amber); text-align: center; }
.sh-outcome-sub { font-size: 9.5px; color: #92400E; opacity: 0.75; text-align: center; }

/* Pillar progress strip */
.sh-pillar-progress {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 18px; margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.sh-progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.sh-progress-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.sh-pillars-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.sh-pillar-block { padding: 14px; background: var(--surface-2); border-radius: var(--r-sm); border: 1px solid var(--border); }
.sh-pillar-name { font-size: 11px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.sh-measure { margin-bottom: 8px; }
.sh-measure-label { font-size: 10.5px; color: var(--text-muted); margin-bottom: 3px; display: flex; justify-content: space-between; }
.sh-measure-pct { font-weight: 600; }

/* Radar container */
.sh-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── ROLE PILL ────────────────────────────────────────── */
.role-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 5px 10px; font-size: 11.5px;
  color: var(--text-secondary); cursor: pointer;
}
.role-pill select { background: transparent; border: none; outline: none; font-family: inherit; font-size: 11.5px; color: var(--text-secondary); cursor: pointer; }
.phase-badge { background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 5px; letter-spacing: 0.5px; }

</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const DATA = {
  currentUser: { name: 'Dr. Priya Sharma', role: 'Program Lead', avatar: 'PS' },
  demoRole: 'Program Lead',
  users: [
    { id:1, name:'Dr. Priya Sharma', role:'Program Lead', email:'priya@lvpei.org', avatar:'PS' },

function fmt(n) {
  if (n >= 10000000) return (n / 10000000).toFixed(2) + ' Cr';
  if (n >= 100000) return (n / 100000).toFixed(2) + ' Lakh';
  return n.toLocaleString('en-IN');
}
function fmtL(n) {
  if (n >= 10000000) return (n / 10000000).toFixed(1) + 'Cr';
  if (n >= 100000) return (n / 100000).toFixed(1) + 'L';
  if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
  return n;
}
function pct(a,b){ return Math.round(a/b*100); }

function statusBadge(s){
  const m={Active:'success',Complete:'success',Approved:'success','In Progress':'info',Planning:'gray',Delayed:'warning','At Risk':'warning','Under Review':'warning',Overdue:'danger',Open:'danger',Critical:'danger',Mitigating:'warning',Resolved:'success',Pending:'gray'};
  return `<span class="badge badge-${m[s]||'gray'}">${s}</span>`;
}
function priorityBadge(p){
  const m={Critical:'danger',High:'warning',Medium:'info',Low:'gray'};
  return `<span class="badge badge-${m[p]||'gray'}">${p}</span>`;
}
function riskColor(s){
  if(s>=15)return{bg:'#FEE2E2',color:'#B91C1C'};
  if(s>=8) return{bg:'#FEF3C7',color:'#B45309'};
  return{bg:'#E8F7F2',color:'#0D7A5F'};
}
function progressColor(p){
  if(p>=70) return '#0D7A5F';
  if(p>=40) return '#1847A8';
  return '#B45309';
}
function avatarColor(i){
  const c=['#1847A8','#0D7A5F','#6D28D9','#0891B2','#B45309'];
  return c[i%c.length];
}

function showNotification(msg){ notification=msg; render(); setTimeout(()=>{notification=null;render();},3000); }

function buildPortfolio(){
  const totalBudget = DATA.programs.reduce((a,p)=>a+p.budget,0);
  const totalSpent  = DATA.programs.reduce((a,p)=>a+p.spent,0);
  const activeProjects = DATA.projects.filter(p=>p.status==='Active').length;
  const atRiskProjects = DATA.projects.filter(p=>p.status==='At Risk'||p.status==='Delayed').length;
  const completedTasks = DATA.tasks.filter(t=>t.status==='Complete').length;

  // Timeline bar: map date string to 0-100% within Jan2024–Mar2027
  function timelinePct(dateStr){
    const months = {'Jan':0,'Feb':1,'Mar':2,'Apr':3,'May':4,'Jun':5,'Jul':6,'Aug':7,'Sep':8,'Oct':9,'Nov':10,'Dec':11};
    const [m,y] = dateStr.split(' ');
    const base = (2024-2024)*12; // Jan 2024 = 0
    const end  = (2027-2024)*12+2; // Mar 2027 = 38
    const pos  = (parseInt(y)-2024)*12 + months[m];
    return Math.round(Math.max(0,Math.min(100, (pos/end)*100)));
  }

  // Year markers for timeline
  const yearMarkers = [
    {label:'2024', pct:0}, {label:'2025', pct:Math.round(12/38*100)},
    {label:'2026', pct:Math.round(24/38*100)}, {label:'2027', pct:Math.round(36/38*100)}
  ];

  return `

      <div class="kpi-label">Portfolio Budget</div>
      <div class="kpi-value">₹${fmt(totalBudget)}</div>

  <div class="card" style="margin-bottom:24px; padding:20px">
    <div style="display:flex;margin-bottom:8px;padding-left:200px;position:relative;height:20px">

      <div style="position:absolute;top:-24px;left:calc(200px + 41%);font-size:10px;color:#2563EB;font-weight:800;transform:translateX(-50%)">Today</div>

      ${DATA.projects.map((pr,i)=>{

/* ─── RISKS ─────────────────────────────────────────── */
function buildRisks(){
  const tabs=['Active Risks','Open Issues','Escalated Items'];
  const riskStats = [
    { label: 'Total Risks', val: DATA.risks.length, color: 'var(--accent)' },
    { label: 'Critical Score', val: DATA.risks.filter(r=>r.score>=15).length, color: 'var(--red)' },
    { label: 'Open Issues', val: DATA.issues.filter(i=>i.status!=='Resolved').length, color: 'var(--amber)' },
    { label: 'Escalations', val: DATA.risks.filter(r=>r.escalated).length + DATA.issues.filter(i=>i.status==='Critical').length, color: 'var(--purple)' }
  ];

  return `
  <div class="grid-4" style="margin-bottom:20px">
    ${riskStats.map(s=>`
      <div class="kpi" style="--kpi-accent:${s.color}">
        <div class="kpi-label">${s.label}</div>
        <div class="kpi-value" style="color:${s.color}">${s.val}</div>
      </div>`).join('')}
  </div>

  <div class="tabs">${tabs.map((t,i)=>`<div class="tab ${activeSubTab===i?'active':''}" onclick="setSubTab(${i})">${t}</div>`).join('')}</div>

  ${activeSubTab === 0 ? buildRisksTab() : activeSubTab === 1 ? buildIssuesTab() : buildEscalationsTab()}
  `;
}

function buildRisksTab(){
  const filteredRisks = (riskFilter.impact && riskFilter.prob) 
    ? DATA.risks.filter(r => r.impact === riskFilter.impact && r.probability === riskFilter.prob)
    : DATA.risks;

  return `
  <div class="grid-2" style="margin-bottom:20px; grid-template-columns: 360px 1fr">
    <div class="card" style="padding:16px">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px">
        <div class="card-title" style="margin:0"><i class="ti ti-grid-dots"></i>Risk Severity Matrix</div>
        ${(riskFilter.impact) ? `<button class="btn btn-sm btn-ghost" style="color:var(--accent); font-weight:700" onclick="setRiskFilter(null, null)">Clear Filter</button>` : ''}
      </div>
      
      <div style="display:flex; gap:10px">
        <!-- Vertical Y-Axis Label -->
        <div style="writing-mode: vertical-lr; transform: rotate(180deg); text-align:center; font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px">Impact</div>
        
        <div style="flex:1">
          <div style="display:flex; flex-direction:column; gap:3px">
            ${[5,4,3,2,1].map(impact => `
              <div style="display:flex; gap:3px; align-items:stretch">
                <div style="width:12px; font-size:10px; color:var(--text-muted); font-weight:700; display:flex; align-items:center; justify-content:center">${impact}</div>
                ${[1,2,3,4,5].map(prob => {
                  const score = prob * impact;
                  const c = riskColor(score);
                  const count = DATA.risks.filter(r => r.probability === prob && r.impact === impact).length;
                  const isSelected = riskFilter.impact === impact && riskFilter.prob === prob;
                  
                  // Visual logic
                  const bg = isSelected ? c.color : (count > 0 ? c.color + 'CC' : c.bg);
                  const text = (count > 0 || isSelected) ? '#fff' : c.color + '40';
                  const border = isSelected ? '2px solid var(--text-primary)' : `1px solid ${c.color}30`;
                  const opacity = (riskFilter.impact && !isSelected) ? '0.4' : '1';

                  return `<div onclick="setRiskFilter(${impact}, ${prob})" 
                    style="flex:1; aspect-ratio:1; border-radius:4px; background:${bg}; border:${border}; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:${text}; transition:all .15s; cursor:pointer; opacity:${opacity}; box-shadow:${isSelected?'var(--shadow-md)':'none'}" 
                    title="Impact ${impact}, Prob ${prob}: Score ${score}">
                    ${count > 0 ? count : ''}
                  </div>`;
                }).join('')}
              </div>
            `).join('')}
            
            <!-- X-Axis Numbers -->
            <div style="display:flex; gap:3px; padding-left:15px; margin-top:4px">
              ${[1,2,3,4,5].map(p => `<div style="flex:1; text-align:center; font-size:10px; color:var(--text-muted); font-weight:700">${p}</div>`).join('')}
            </div>
            
            <!-- X-Axis Label -->
            <div style="text-align:center; font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px">Probability</div>
          </div>
        </div>
      </div>

      <div style="display:flex; gap:12px; margin-top:20px; justify-content:center; border-top:1px solid var(--border); padding-top:16px">
        <span style="display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:#B91C1C"><span style="width:10px; height:10px; border-radius:2px; background:#B91C1C"></span>EXTREME</span>
        <span style="display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:#B45309"><span style="width:10px; height:10px; border-radius:2px; background:#B45309"></span>HIGH</span>
        <span style="display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; color:#0D7A5F"><span style="width:10px; height:10px; border-radius:2px; background:#0D7A5F"></span>LOW</span>
      </div>
      <div style="margin-top:12px; font-size:10.5px; color:var(--text-muted); text-align:center; font-style:italic">Click any cell to filter the register below</div>
    </div>
    
    <div class="card">
      <div class="card-title">
        <i class="ti ti-list"></i>
        ${riskFilter.impact ? `Risks with Impact ${riskFilter.impact} & Probability ${riskFilter.prob}` : 'Active Risk Register'}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Risk Detail & Mitigation</th><th>Owner</th><th>Project</th><th>Score</th><th>Next Review</th></tr></thead>
          <tbody>
            ${filteredRisks.length ? filteredRisks.map(r => {
              const c = riskColor(r.score);
              const owner = DATA.users.find(u => u.name === r.owner) || { avatar: '??' };
              return `
              <tr>
                <td style="font-family:monospace; color:var(--text-muted)">${r.id}</td>
                <td style="min-width:240px">
                  <div style="font-weight:600; color:var(--text-primary); margin-bottom:4px">${r.title}</div>
                  <div style="font-size:10.5px; color:var(--text-secondary); line-height:1.3; background:var(--surface-2); padding:6px 8px; border-radius:4px; border-left:2px solid ${c.color}">
                    <span style="font-weight:700; font-size:9px; text-transform:uppercase; display:block; margin-bottom:2px">Mitigation Plan:</span>
                    ${r.mitigation}
                  </div>
                </td>
                <td>
                  <div style="display:flex; align-items:center; gap:8px">
                    <div class="avatar" style="background:var(--accent-light); color:var(--accent); font-size:10px">${owner.avatar}</div>
                    <div style="font-size:11.5px">${r.owner}</div>
                  </div>
                </td>
                <td><span class="tag">${r.project}</span></td>
                <td><span style="background:${c.bg}; color:${c.color}; padding:2px 8px; border-radius:4px; font-weight:800; font-size:12px">${r.score}</span></td>
                <td style="font-size:11px; color:var(--text-muted); font-weight:600">${r.nextReview}</td>
              </tr>`;
            }).join('') : `<tr><td colspan="6" style="padding:40px; text-align:center; color:var(--text-muted)">No risks found for this selection</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

window.setRiskFilter = function(i, p) {
  if (riskFilter.impact === i && riskFilter.prob === p) {
    riskFilter = { impact: null, prob: null };
  } else {
    riskFilter = { impact: i, prob: p };
  }
  render();
};

        <div class="sh-cell${isAI?' sh-cell-ai':''}" style="border-right:${i===rowData.length-1?'none':'1px solid var(--border)'}">
          ${cell||'<span style="color:var(--border-2)">—</span>'}

      ${trackHeaderHTML}

      <!-- Initiative rows 1–3 -->
      ${s.initiatives.slice(0,3).map(row=>initRow(row,false)).join('')}

      <!-- AI row -->
      <div class="sh-corner" style="background:#F0F4FF;border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center">
        <div style="font-size:9.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.8px;text-align:center;padding:0 6px">AI &<br>Tech</div>
      </div>
      ${s.initiatives[3].map((cell,i)=>`
        <div class="sh-cell sh-cell-ai" style="border-right:${i===3?'none':'1px solid var(--border)'}">
          <i class="ti ti-sparkles" style="font-size:12px;margin-right:5px;flex-shrink:0"></i>${cell}
        </div>`).join('')}

      <!-- Enabler rows -->
      ${enablerRows}

      <!-- KPI outcome row -->
      ${outcomeRow}

    </div>
  </div>

  <!-- ── PILLAR PROGRESS ────────────────────────────── -->
  <div class="sh-pillar-progress">
    <div class="sh-progress-header">
      <div class="sh-progress-title" style="color:#0F172A; font-weight:800">Strategic Pillar Performance vs. Target</div>
      <span class="badge badge-gray" style="font-size:10px; font-weight:700">FY 2024–25 · Mid-year review</span>
    </div>
    <div class="sh-pillars-grid">
      ${s.pillars.map(p=>`
        <div class="sh-pillar-block" style="border-top:4px solid ${p.color}; background:#fff">
          <div class="sh-pillar-name" style="color:${p.color}; font-weight:900">${p.name.toUpperCase()}</div>
          ${p.measures.map(m=>{
            const pv=Math.min(Math.round(m.actual/m.target*100),100);
            const mc=pv>=90?'#059669':pv>=65?'#2563EB':'#D97706';
            return`<div class="sh-measure">
              <div class="sh-measure-label" style="margin-bottom:6px">
                <span style="color:#475569; font-weight:700">${m.name}</span>
                <span class="sh-measure-pct" style="color:${mc}; font-weight:900; font-size:12px">${pv}%</span>
              </div>
              <div class="progress-bar" style="height:8px; background:${p.color}15"><div class="progress-fill" style="width:${pv}%; background:${p.color}; border-radius:4px"></div></div>
              <div style="display:flex; justify-content:space-between; margin-top:5px; font-size:10px; color:var(--text-muted); font-weight:700">
                <span>${fmtL(m.actual)}${m.unit?` ${m.unit}`:''} <span style="font-weight:500">actual</span></span>
                <span>Target: ${fmtL(m.target)}${m.unit?` ${m.unit}`:''}</span>
              </div>
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>
  </div>

  <!-- ── CHARTS ──────────────────────────────────────── -->
  <div class="sh-charts" style="grid-template-columns: 1fr">
    <div class="card">
      <div class="card-title" style="color:#0F172A; font-weight:800"><i class="ti ti-chart-radar"></i>Strategic KPI Achievement</div>
      <div class="chart-wrap" style="height:320px"><canvas id="strategyChart"></canvas></div>
    </div>
  </div>`;
}

    content=`
      <div class="modal-title">Add New Task</div>
      <div class="form-group"><label class="form-label">Task Name</label><input class="form-input" placeholder="Describe the task..."></div>
      <div class="form-group"><label class="form-label">Project</label><select class="form-select">${DATA.projects.map(p=>`<option>${p.name}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Assignee</label><select class="form-select">${DATA.users.map(u=>`<option>${u.name}</option>`).join('')}</select></div>

      <div class="form-group"><label class="form-label">Dependency Type</label><select class="form-select"><option>FS — Finish to Start</option><option>FF — Finish to Finish</option><option>SS — Start to Start</option><option>SF — Start to Finish</option></select></div>

      <div class="modal-title">Update Budget Allocation</div>

      <div class="form-group"><label class="form-label">Allocation Type</label><select class="form-select"><option>Initial Budget</option><option>Budget Revision</option><option>Vendor Payment</option><option>Contingency Release</option></select></div>

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Cancel</button>

      <div class="modal-title">${v.name}</div>
      <div class="grid-3" style="margin-bottom:16px">
        <div class="kpi" style="--kpi-accent:var(--accent)"><div class="kpi-label">Status</div><div style="margin-top:6px">${statusBadge(v.status)}</div></div>

        <div class="form-group"><label class="form-label">Country</label><input class="form-input" value="${v.country}"></div>
      </div>
      <div class="form-group"><label class="form-label">Lead Contact</label><input class="form-input" value="${v.lead}"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" onclick="showNotification('Vendor updated');closeModal()"><i class="ti ti-check"></i>Save Changes</button>
      </div>` : `
      <div class="modal-title">Onboard New Vendor</div>
      <div class="form-group"><label class="form-label">Company Name</label><input class="form-input" placeholder="Vendor company name..."></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Type</label><select class="form-select"><option>AI/ML</option><option>Software</option><option>Diagnostics</option><option>Logistics</option><option>Analytics</option></select></div>
        <div class="form-group"><label class="form-label">Country</label><input class="form-input" placeholder="Country..."></div>
      </div>
      <div class="form-group"><label class="form-label">Lead Contact</label><input class="form-input" placeholder="Name..."></div>
      <div class="form-group"><label class="form-label">Contact Email</label><input class="form-input" type="email" placeholder="email@vendor.com"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="showNotification('Vendor submitted for review');closeModal()"><i class="ti ti-check"></i>Submit for Review</button>
      </div>`;
  } else if(type==='program'){
    const p=data;
    const projs=DATA.projects.filter(pr=>pr.program===(p.short||p.name)||p.projects?.includes(pr.id));
    content = p.name ? `
      <div class="modal-title" style="color:${p.color}">${p.name}</div>
      <div class="grid-2" style="margin-bottom:14px">
        <div class="kpi" style="--kpi-accent:${p.color}"><div class="kpi-label">Budget</div><div class="kpi-value" style="font-size:20px">₹${fmt(p.budget)}</div></div>
        <div class="kpi" style="--kpi-accent:${p.color}"><div class="kpi-label">Progress</div><div class="kpi-value" style="font-size:20px">${p.progress}%</div></div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Projects in this Programme</div>
      ${projs.map(pr=>`<div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12.5px;font-weight:600">${pr.name}</div><div style="font-size:10.5px;color:var(--text-muted)">${pr.lead}</div></div>
        <div style="display:flex;align-items:center;gap:8px">${statusBadge(pr.status)}<span style="font-size:11px;color:var(--text-muted)">${pr.progress}%</span></div>
      </div>`).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Close</button>
      </div>` : `
      <div class="modal-title">Add New Programme</div>
      <div class="form-group"><label class="form-label">Programme Name</label><input class="form-input" placeholder="Name..."></div>
      <div class="form-group"><label class="form-label">Programme Lead</label><select class="form-select">${DATA.users.map(u=>`<option>${u.name}</option>`).join('')}</select></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Start Date</label><input class="form-input" type="date"></div>
        <div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date"></div>
      </div>
      <div class="form-group"><label class="form-label">Approved Budget (₹)</label><input class="form-input" type="number" placeholder="0"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="showNotification('Programme created');closeModal()"><i class="ti ti-check"></i>Create Programme</button>
      </div>`;
  } else if(type==='project'){
    const p=data;
    const tasks=DATA.tasks.filter(t=>t.project===p.id);
    content=`
      <div class="modal-title">${p.name}</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">${statusBadge(p.status)}${priorityBadge(p.priority)}<span style="font-size:12px;color:var(--text-muted)">Lead: ${p.lead}</span></div>
      <div class="grid-2" style="margin-bottom:14px">
        <div class="kpi" style="--kpi-accent:var(--accent)"><div class="kpi-label">Budget</div><div class="kpi-value" style="font-size:20px">₹${fmt(p.budget)}</div></div>
        <div class="kpi" style="--kpi-accent:var(--green)"><div class="kpi-label">Progress</div><div class="kpi-value" style="font-size:20px">${p.progress}%</div></div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Tasks (${tasks.length})</div>
      ${tasks.length?tasks.map(t=>`
        <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px;margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:12.5px;font-weight:600">${t.name}</div>${statusBadge(t.status)}
          </div>
          <div style="display:flex;gap:12px;margin-top:4px;font-size:10.5px;color:var(--text-muted)">
            <span>${t.assignee}</span><span>Due: ${t.due}</span>

        </div>`).join(''):'<div style="padding:24px;text-align:center;color:var(--text-muted)">No tasks logged yet</div>'}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">

  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${content}</div></div>`;
}

/* ─── CHARTS ────────────────────────────────────────── */
const COLORS = ['#1847A8','#0D7A5F','#B45309','#6D28D9','#0891B2'];
let chartInstances = {};
function initCharts(){
  const grid = '#E2E8F0';
  const tick = '#475569';
  const textDark = '#0F172A';
  const defaults = { 
    responsive:true, 
    maintainAspectRatio:false, 
    plugins:{
      legend:{
        labels:{
          color:tick,
          font:{size:11,family:'DM Sans',weight:'500'},
          usePointStyle:true,
          padding:15
        }
      }
    } 
  };

  function setChart(id, config){
    const el = document.getElementById(id);
    if(!el) return;
    if(chartInstances[id]) chartInstances[id].destroy();
    chartInstances[id] = new Chart(el, config);
  }

  setChart('budgetChart',{type:'doughnut',data:{
    labels:DATA.programs.map(p=>p.short||p.name),
    datasets:[{data:DATA.programs.map(p=>p.spent),backgroundColor:COLORS,borderWidth:0,hoverOffset:10}]
  },options:{...defaults,cutout:'72%',plugins:{legend:{position:'right',labels:{color:tick,font:{size:11,family:'DM Sans',weight:'600'},boxWidth:8}}}}});

  setChart('progressChart',{type:'bar',data:{
    labels:DATA.programs.map(p=>p.short||p.name),
    datasets:[{data:DATA.programs.map(p=>p.progress),backgroundColor:COLORS.map(c=>c+'CC'),borderRadius:4,barThickness:12}]
  },options:{...defaults,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{max:100,ticks:{color:tick,callback:v=>v+'%'},grid:{display:false}},y:{ticks:{color:tick,font:{size:11,weight:'600'}},grid:{display:false}}}}});

  setChart('programBudgetChart',{type:'bar',data:{
    labels:DATA.programs.map(p=>p.short||p.name),
    datasets:[
      {label:'Budget',data:DATA.programs.map(p=>p.budget),backgroundColor:'rgba(24,71,168,0.08)',borderColor:'#1847A8',borderWidth:1,borderRadius:6},
      {label:'Spent', data:DATA.programs.map(p=>p.spent), backgroundColor:'rgba(13,122,95,0.8)',borderRadius:6}
    ]
  },options:{...defaults,scales:{x:{ticks:{color:tick,font:{weight:'600'}},grid:{display:false}},y:{ticks:{color:tick,callback:v=>fmtL(v)},grid:{color:grid,drawBorder:false}}}}});

  setChart('budgetVsSpendChart',{type:'bar',data:{
    labels:DATA.programs.map(p=>p.short||p.name),
    datasets:[
      {label:'Budget',data:DATA.programs.map(p=>p.budget),backgroundColor:'rgba(24,71,168,0.08)',borderColor:'#1847A8',borderWidth:1,borderRadius:6,barPercentage:0.65},
      {label:'Spent', data:DATA.programs.map(p=>p.spent), backgroundColor:DATA.programs.map(p=>p.spent/p.budget>0.8?'#DC2626':'#10B981'),borderRadius:6,barPercentage:0.65}
    ]
  },options:{...defaults,scales:{x:{ticks:{color:tick,font:{weight:'600'}},grid:{display:false}},y:{ticks:{color:tick,callback:v=>fmtL(v)},grid:{color:grid,drawBorder:false}}}}});

  setChart('vendorSpendChart',{type:'pie',data:{
    labels:DATA.vendors.filter(v=>v.spend>0).map(v=>v.name),
    datasets:[{data:DATA.vendors.filter(v=>v.spend>0).map(v=>v.spend),backgroundColor:COLORS,borderWidth:3,borderColor:'#fff'}]
  },options:{...defaults,plugins:{legend:{position:'right',labels:{color:textDark,font:{size:11,family:'DM Sans',weight:'600'},boxWidth:10}},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': ₹'+fmt(ctx.raw)}}}}});

  setChart('riskCatChart',{type:'doughnut',data:{
    labels:Object.keys(DATA.risks.reduce((a,r)=>{a[r.category]=(a[r.category]||0)+1;return a},{})),
    datasets:[{data:Object.values(DATA.risks.reduce((a,r)=>{a[r.category]=(a[r.category]||0)+1;return a},{})),backgroundColor:['#EF4444','#F59E0B','#1847A8','#0D7A5F','#6D28D9','#0891B2'],borderWidth:3,borderColor:'#fff'}]
  },options:{...defaults,cutout:'70%',plugins:{legend:{position:'right',labels:{color:textDark,font:{size:11,family:'DM Sans',weight:'600'},boxWidth:10}}}}});

  setChart('vendorSpendPie', {
    type: 'doughnut',
    data: {
      labels: DATA.vendors.filter(v=>v.spend>0).map(v=>v.name),
      datasets: [{
        data: DATA.vendors.filter(v=>v.spend>0).map(v=>v.spend),
        backgroundColor: COLORS,
        borderWidth: 0,
        hoverOffset: 12
      }]
    },
    options: {
      ...defaults,
      cutout: '75%',
      plugins: {
        legend: { 
          position: 'bottom', 
          labels: { color: textDark, font: { weight: '700', size: 10 }, usePointStyle: true, padding: 10 } 
        },
        tooltip: {
          callbacks: { label: ctx => ` ₹${fmt(ctx.raw)} (${Math.round(ctx.parsed/totalSpend*100)}%)` }
        }
      }
    }
  });

  // Vendor Performance Rank Bar
  const vApproved = DATA.vendors.filter(v=>v.performance>0).sort((a,b)=>b.performance-a.performance);
  setChart('vendorPerfRankChart', {
    type: 'bar',
    data: {
      labels: vApproved.map(v=>v.name),
      datasets: [{
        label: 'Performance %',
        data: vApproved.map(v=>v.performance),
        backgroundColor: vApproved.map(v=>v.performance>=85?'rgba(5,150,105,0.8)':'rgba(217,119,6,0.8)'),
        borderRadius: 4,
        barThickness: 20
      }]
    },
    options: {
      ...defaults,
      indexAxis: 'y',
      scales: {
        x: { max: 100, ticks: { color: tick }, grid: { display: false } },
        y: { ticks: { color: textDark, font: { weight: '700' } }, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    }
  });

  // Vendor Spend Bar
  const vSpend = [...DATA.vendors].sort((a,b)=>b.spend-a.spend);
  setChart('vendorSpendBarChart', {
    type: 'bar',
    data: {
      labels: vSpend.map(v=>v.name),
      datasets: [{
        label: 'Spend (₹L)',
        data: vSpend.map(v=>v.spend/100000),
        backgroundColor: 'rgba(37,99,235,0.8)',
        borderRadius: 4,
        barThickness: 20
      }]
    },
    options: {
      ...defaults,
      indexAxis: 'y',
      scales: {
        x: { ticks: { color: tick, callback: v=>v+'L' }, grid: { display: false } },
        y: { ticks: { color: textDark, font: { weight: '700' } }, grid: { display: false } }
      },
      plugins: { legend: { display: false } }
    }
  });

  // Program Budget Horizontal Chart
  setChart('programBudgetHBarChart', {
    type: 'bar',
    data: {
      labels: DATA.programs.map(p=>p.short||p.name),
      datasets: [
        { label: 'Total Budget', data: DATA.programs.map(p=>p.budget), backgroundColor: 'rgba(15,23,42,0.05)', borderColor: '#0F172A', borderWidth: 1, borderRadius: 6, barPercentage: 0.6, grouped: false },
        { label: 'Actual Spent', data: DATA.programs.map(p=>p.spent), backgroundColor: DATA.programs.map(p=>p.spent/p.budget>0.8?'#DC2626':'#2563EB'), borderRadius: 6, barPercentage: 0.6, grouped: false }
      ]
    },
    options: {
      ...defaults,
      indexAxis: 'y',
      scales: {
        x: { ticks: { color: tick, callback: v=>fmtL(v) }, grid: { display: false } },
        y: { ticks: { color: textDark, font: { weight: '700' } }, grid: { display: false } }
      },
      plugins: { legend: { position: 'bottom', labels: { color: textDark, font: { weight: '700' } } } }
    }
  });

  // Portfolio Distribution
  setChart('programDistributionChart', {
    type: 'doughnut',
    data: {
      labels: DATA.programs.map(p=>p.short||p.name),
      datasets: [{
        data: DATA.programs.map(p=>p.budget),
        backgroundColor: DATA.programs.map(p=>p.color),
        borderWidth: 0,
        hoverOffset: 15
      }]
    },
    options: {
      ...defaults,
      cutout: '70%',
      plugins: {
        legend: { position: 'right', labels: { color: textDark, font: { weight: '700' }, boxWidth: 10 } }
      }
    }
  });

  // Strategy radar
  const am=DATA.strategy.pillars.flatMap(p=>p.measures.slice(0,2));
  setChart('strategyChart',{type:'radar',data:{
    labels:am.map(m=>m.name),
    datasets:[
      {label:'Achievement',data:am.map(m=>Math.round(m.actual/m.target*100)),backgroundColor:'rgba(24,71,168,0.18)',borderColor:'#1847A8',borderWidth:3,pointBackgroundColor:'#1847A8',pointRadius:4},
      {label:'Target (100%)',data:am.map(()=>100),backgroundColor:'transparent',borderColor:'rgba(71,85,105,0.2)',borderWidth:1,borderDash:[4,4],pointRadius:0}
    ]
  },options:{...defaults,scales:{r:{ticks:{display:false},grid:{color:'rgba(71,85,105,0.1)'},angleLines:{color:'rgba(71,85,105,0.1)'},pointLabels:{color:textDark,font:{size:11,family:'DM Sans',weight:'700'}}}},plugins:{legend:{labels:{color:textDark,font:{size:12,weight:'700'}}}}}});
}

window.setTab=function(t){activeTab=t;activeSubTab=0;render();};
window.setSubTab=function(i){activeSubTab=i;render();};
window.openModal=openModal;
window.closeModal=closeModal;

render();
</script>
